<!DOCTYPE html>
<html lang="en">
<!--
  ════════════════════════════════════════════════════════════════
  UI TWEAKER — fixed-interface template (panel-template.html)
  ════════════════════════════════════════════════════════════════
  This is the ui-tweaker skill's "frozen UI" template. Every time you
  open a control panel, copy this file and replace ONLY the marked
  ⟦PROJECT-SPECIFIC⟧ blocks below. Everything else (the three-pane
  panel, number boxes, PS-style linked radii, the left Layers tree,
  drag-to-scrub, alignment icons, all CSS and the builder JS) stays
  byte-for-byte identical so every project's panel looks the same.

  Spots to replace (search for the ⟦PROJECT-SPECIFIC⟧ markers):
    1. <title>
    2. font <link> (your project's actual fonts)
    3. stylesheet <link href> (your project's REAL CSS — never hand-copy values)
    4. preview DOM inside #card-stage (your real component markup; each
       atomic element gets data-pick)
    5. SEL map (pick key → selector used to query inside the widget)
    6. OUT_SEL map (pick key → CSS selector emitted in the confirm output)
    7. LAYERS tree (your real DOM decomposed to atomic level; LAYER_LABEL
       is derived automatically)
    8. confirm-output "component / source" strings
    9. #card-stage component reset CSS — ONLY needed when your real
       component is hidden / absolutely positioned in production (it
       resets it to a visible static element on the stage and wires the
       card-level transform var). For a normally-visible component you
       can leave the generic .demo-card rule as-is or adapt the selector.

  As shipped, this template is wired to the generic demo component in
  ../../../examples/demo.css so you can open it and see the panel work.
  Everything else must stay untouched.
  ════════════════════════════════════════════════════════════════
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- ⟦PROJECT-SPECIFIC #1: title⟧ -->
<title>UI Tweaker — Demo Card</title>

<!-- ⟦PROJECT-SPECIFIC #2: replace with your project's actual font links⟧ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=TASA+Explorer:wght@400..800&display=swap" rel="stylesheet">

<!-- ⟦PROJECT-SPECIFIC #3: link your project's REAL stylesheet so the browser resolves the full cascade (including every !important override layer). Never hand-copy values into this file's <style>. Shipped pointing at the generic demo component.⟧ -->
<link rel="stylesheet" href="../../../examples/demo.css">

<style>
  /* ===== Tweaker shell (does not affect the component own styles) ===== */
	  :root {
	    color-scheme: light;
	    --tw-accent:#e04120;
	    --tw-accent-strong:#b93419;
	    --tw-accent-soft:#fde9e4;
	    --tw-accent-softer:#fdf2ef;
	    --tw-accent-glow:rgba(224,65,32,.15);
	    --tw-accent-frame:rgba(224,65,32,.9);
	    --tw-accent-frame-strong:rgba(224,65,32,.95);
	    --tw-accent-frame-soft:rgba(224,65,32,.1);
	  }
  html, body.tw-body { background:#e9ecf1; margin:0; }
  body.tw-body { font-family: 'TASA Explorer','Chiron Hei HK','Chocolate Classical Sans',sans-serif; }
  .tw-wrap { display:grid; grid-template-columns: var(--tw-left-w, 230px) 6px 1fr 360px; gap:0; height:100vh; }

  /* ===== Left: Pages / Layers (Figma style) ===== */
  .tw-layers { grid-column:1; background:#fff; border-right:1px solid #e3e3e7; overflow:auto; display:flex; flex-direction:column; min-width:0; }
  .tw-left-resizer { grid-column:2; cursor:col-resize; background:#fff; border-right:1px solid #d9dce2; position:relative; z-index:8; }
  .tw-left-resizer::after { content:""; position:absolute; inset:0 2px; border-radius:99px; }
	  .tw-left-resizer:hover::after, .tw-left-resizer.dragging::after { background:var(--tw-accent); }
  .tw-lay-top { flex:none; display:flex; align-items:center; gap:8px; padding:13px 14px 12px; border-bottom:1px solid #ececec; font-size:12.5px; font-weight:600; color:#1e1e1e; }
  .tw-lay-top .tw-lay-emoji { font-size:14px; }
  .tw-lay-sec { padding:10px 8px; border-bottom:1px solid #f1f1f1; min-width:0; }
  .tw-lay-sec:last-child { border-bottom:none; }
  .tw-lay-h { font-size:10.5px; font-weight:600; letter-spacing:.5px; color:#aaa; text-transform:uppercase; padding:2px 8px 6px; }
  .tw-lay-page { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:6px; font-size:12px; color:#3c4043; background:#f3f3f4; cursor:default; }
  .tw-lay-row { position:relative; overflow:hidden; display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:6px; font-size:12px; color:#3c4043; cursor:pointer; white-space:nowrap; user-select:none; min-width:0; }
  .tw-lay-row:hover { background:#f3f3f4; }
	  .tw-lay-row.on { background:var(--tw-accent-soft); color:var(--tw-accent); }
	  .tw-lay-row.on .tw-lay-ico { color:var(--tw-accent); }
  .tw-lay-row.hidden { opacity:.46; }
  .tw-lay-caret { width:12px; flex:none; color:#bbb; font-size:11px; line-height:1; text-align:center; cursor:pointer; }
  .tw-lay-caret.leaf { visibility:hidden; }
  .tw-lay-ico { flex:none; color:#9aa0a6; display:flex; }
  .tw-lay-ico svg { width:15px; height:15px; }
  .tw-lay-name { flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tw-lay-eye { position:absolute; right:6px; top:50%; transform:translateY(-50%); width:20px; height:20px; border:0; border-radius:5px; background:#f3f3f4; color:#9aa0a6; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; box-shadow:-8px 0 10px #f3f3f4; }
	  .tw-lay-row.on .tw-lay-eye { background:var(--tw-accent-soft); box-shadow:-8px 0 10px var(--tw-accent-soft); }
  .tw-lay-row:hover .tw-lay-eye, .tw-lay-eye:focus-visible { opacity:1; pointer-events:auto; }
  .tw-lay-eye:hover { background:#e8eaed; color:#3c4043; }
  .tw-lay-eye svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tw-lay-children { display:block; }
  .tw-lay-children.collapsed { display:none; }
  .tw-left { grid-column:3; position:relative; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-start; overflow:auto; padding:88px 56px 56px; background:
      radial-gradient(circle at 30% 20%, #f6f8fb, #e3e7ee); }
  .tw-left.space-pan { cursor:grab; }
  .tw-left.is-panning, .tw-left.is-panning * { cursor:grabbing !important; user-select:none !important; }
  .tw-left.space-pan #card-stage { pointer-events:none; }
  .tw-left.space-pan #tw-tbox, .tw-left.space-pan #tw-selected { pointer-events:none; }
  .tw-layer-hidden { visibility:hidden !important; }
  .tw-right { grid-column:4; background:#fff; border-left:1px solid #e3e3e7; overflow:hidden; padding:0; display:flex; flex-direction:column; height:100vh; box-sizing:border-box; }

  /* Preview control bar (device width + undo/redo) */
  .tw-toolbar { position:fixed; top:14px; left:calc(var(--tw-left-w, 230px) + 6px); right:360px; display:flex; justify-content:space-between; gap:14px; align-items:center; z-index:100002; padding:0 20px; box-sizing:border-box; pointer-events:none; }
  .tw-toolbar > * { pointer-events:auto; }
  .tw-tb-center { display:flex; gap:14px; align-items:center; }
  .tw-seg { display:flex; background:#fff; border:1px solid #dadce0; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .tw-seg button { border:none; background:transparent; padding:7px 10px; cursor:pointer; color:#5f6368; display:flex; }
	  .tw-seg button.on { background:var(--tw-accent); color:#fff; }
  .tw-seg button svg { width:18px; height:18px; }
  .tw-hist { display:flex; gap:6px; }
  .tw-hist button { width:34px; height:34px; border-radius:9px; border:1px solid #dadce0; background:#fff; cursor:pointer; color:#5f6368; box-shadow:0 1px 3px rgba(0,0,0,.08); display:flex; align-items:center; justify-content:center; }
  .tw-hist button:disabled { opacity:.4; cursor:default; }
  .tw-hist button svg { width:18px; height:18px; }
  .tw-hist #btn-guide svg { width:20px; height:20px; }
	  .tw-hist button.on { background:var(--tw-accent); border-color:var(--tw-accent); color:#fff; }
  #multi-align[hidden] { display:none; }
  .tw-multi-div { width:1px; align-self:stretch; background:#dadce0; margin:2px 2px; }
  /* Zoom view (scales the preview only, not the whole page) */
  .tw-zoom { display:flex; gap:6px; align-items:center; }
  .tw-zoom button { width:34px; height:34px; border-radius:9px; border:1px solid #dadce0; background:#fff; cursor:pointer; color:#5f6368; box-shadow:0 1px 3px rgba(0,0,0,.08); display:flex; align-items:center; justify-content:center; }
  .tw-zoom button svg { width:18px; height:18px; }
  .tw-zoom #zoom-val { min-width:46px; text-align:center; font-size:12px; color:#3c4043; background:#fff; border:1px solid #dadce0; border-radius:9px; height:34px; line-height:32px; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:0 6px; }

  /* One-click alignment tools (icon buttons) */
  .tw-align { margin:4px 0 11px; display:flex; flex-direction:column; gap:8px; }
  .tw-align-grp { display:flex; align-items:center; gap:4px; }
  .tw-align-lbl { font-size:11px; color:#999; width:56px; flex:none; }
  .tw-align-grp button { width:30px; height:28px; padding:0; border-radius:6px; border:1px solid #e6e6e6; background:#f7f7f8; color:#5f6368; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.12s; }
  .tw-align-grp button svg { width:17px; height:17px; }
  .tw-align-grp button:hover { background:#ececef; border-color:#d6d6d8; }
	  .tw-align-grp button.on { background:var(--tw-accent); border-color:var(--tw-accent); color:#fff; }
  .tw-icon-tools { margin:4px 0 11px; display:flex; flex-direction:column; gap:8px; }
  .tw-icon-tool-row { display:grid; grid-template-columns:72px 1fr; gap:8px; align-items:center; }
  .tw-icon-tool-row .tw-align-lbl { width:auto; }
  .tw-icon-btns { display:flex; border:1px solid #e4e4e6; border-radius:9px; overflow:hidden; background:#fff; }
  .tw-icon-btns button { flex:1; min-width:0; height:32px; border:0; border-right:1px solid #eeeeef; background:#fff; color:#5f6368; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .tw-icon-btns button:last-child { border-right:0; }
  .tw-icon-btns button:hover { background:#f4f4f5; }
	  .tw-icon-btns button.on { background:var(--tw-accent-soft); color:var(--tw-accent); }
  .tw-icon-btns svg { width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  /* ⟦PROJECT-SPECIFIC #9: component stage reset⟧
     Only needed when your real component is hidden / absolutely positioned in
     production. This resets it to a visible static element on the stage and wires
     the card-level transform var (--tw-card-transform). Swap `.demo-card` for your
     real root selector; drop the visibility/position overrides if your component is
     already visible & static. Keep the transform line so card-level transform works. */
  #card-stage { display:flex; align-items:center; justify-content:center; flex:none; margin:auto; }
  #card-stage .demo-card {
    position: relative !important;
    left:auto !important; right:auto !important; top:auto !important; bottom:auto !important;
    transform: var(--tw-card-transform, none) !important;
    transform-origin: center center !important;
    margin:0 !important;
    opacity:1 !important; visibility:visible !important; pointer-events:auto !important;
  }
  /* Alignment guides */
	  .tw-guide { position:absolute; background:var(--tw-accent); z-index:9; opacity:0; transition:opacity .15s; pointer-events:none; }
  .tw-guide.vx { width:1px; top:0; bottom:0; left:50%; }
  .tw-guide.hy { height:1px; left:0; right:0; top:50%; }
  .tw-guide.show { opacity:.7; }
	  .tw-guide-label { position:absolute; top:8px; left:50%; transform:translateX(-50%); background:var(--tw-accent); color:#fff; font-size:11px; padding:2px 8px; border-radius:6px; z-index:10; opacity:0; transition:opacity .15s; pointer-events:none; }
  .tw-guide-label.show { opacity:1; }
  #tw-smart { position:absolute; left:0; top:0; width:0; height:0; z-index:99998; pointer-events:none; }
  .tw-smart-line { position:absolute; background:rgba(34,214,111,.5); box-shadow:0 0 0 1px rgba(34,214,111,.09); display:none; }
  .tw-smart-line.v { width:1.5px; top:0; }
  .tw-smart-line.h { height:1.5px; left:0; }
  .tw-smart-line.show { display:block; }
  .tw-smart-tip { position:absolute; display:none; padding:4px 8px; border-radius:6px; background:#202124; color:#fff; font-size:11px; font-weight:600; line-height:1; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.2); }
  .tw-smart-tip.show { display:block; }
  #tw-rulers { position:absolute; left:0; top:0; width:0; height:0; z-index:99996; pointer-events:none; display:none; color:#5f6368; font-size:10px; font-weight:600; user-select:none; }
  #tw-rulers.show { display:block; }
  .tw-ruler-h, .tw-ruler-v { position:absolute; background-color:rgba(238,238,235,.96); box-shadow:0 1px 2px rgba(0,0,0,.12); pointer-events:auto; }
  .tw-ruler-h {
    height:24px;
    background:
      repeating-linear-gradient(90deg, transparent 0 calc(var(--tw-ruler-minor, 10px) - 1px), rgba(32,33,36,.72) calc(var(--tw-ruler-minor, 10px) - 1px) var(--tw-ruler-minor, 10px)) left bottom/100% 9px no-repeat,
      repeating-linear-gradient(90deg, transparent 0 calc(var(--tw-ruler-major, 50px) - 1px), rgba(32,33,36,.9) calc(var(--tw-ruler-major, 50px) - 1px) var(--tw-ruler-major, 50px)) left bottom/100% 17px no-repeat,
      rgba(238,238,235,.96);
    border-bottom:1px solid rgba(32,33,36,.22);
    cursor:ns-resize;
  }
  .tw-ruler-v {
    width:24px;
    background:
      repeating-linear-gradient(0deg, transparent 0 calc(var(--tw-ruler-minor, 10px) - 1px), rgba(32,33,36,.72) calc(var(--tw-ruler-minor, 10px) - 1px) var(--tw-ruler-minor, 10px)) right top/9px 100% no-repeat,
      repeating-linear-gradient(0deg, transparent 0 calc(var(--tw-ruler-major, 50px) - 1px), rgba(32,33,36,.9) calc(var(--tw-ruler-major, 50px) - 1px) var(--tw-ruler-major, 50px)) right top/17px 100% no-repeat,
      rgba(238,238,235,.96);
    border-right:1px solid rgba(32,33,36,.22);
    cursor:ew-resize;
  }
  .tw-ruler-corner { position:absolute; width:24px; height:24px; background:rgba(238,238,235,.98); border-right:1px solid rgba(32,33,36,.22); border-bottom:1px solid rgba(32,33,36,.22); box-shadow:0 1px 2px rgba(0,0,0,.08); pointer-events:none; }
	  .tw-ruler-guide { position:absolute; background:rgba(224,65,32,.55); pointer-events:auto; }
  .tw-ruler-guide.v { width:1px; top:0; cursor:ew-resize; }
  .tw-ruler-guide.h { height:1px; left:0; cursor:ns-resize; }
  .tw-ruler-guide.dragging { background:rgba(74,222,128,.9); }
  .tw-ruler-guide.selected { background:rgba(134,239,172,.95); }
	  .tw-ruler-readout { position:absolute; z-index:100003; display:none; padding:3px 7px; border-radius:6px; background:var(--tw-accent); color:#fff; font-size:11px; line-height:1; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.18); pointer-events:none; }
  .tw-ruler-readout.show { display:block; }
  .tw-menu { position:fixed; z-index:100010; min-width:178px; padding:6px; border-radius:10px; background:#202124; color:#f8fafd; box-shadow:0 12px 34px rgba(0,0,0,.28); display:none; }
  .tw-menu.show { display:block; }
  .tw-menu button { width:100%; display:flex; align-items:center; justify-content:space-between; gap:18px; padding:8px 10px; border:0; border-radius:7px; background:transparent; color:inherit; font:inherit; font-size:12px; text-align:left; cursor:pointer; }
	  .tw-menu button:hover { background:var(--tw-accent); }
  .tw-menu button:disabled { color:#8b9098; cursor:default; }
  .tw-menu button:disabled:hover { background:transparent; }
  .tw-menu .tw-menu-sep { height:1px; margin:6px 2px; background:rgba(255,255,255,.14); }

  /* Preview element selection hint (low-noise: inner outline, does not pollute box-shadow) */
	  .tw-pick { outline:2px solid var(--tw-accent-frame); outline-offset:-2px; }
  #tw-selected { position:absolute; left:0; top:0; width:0; height:0; z-index:99997; pointer-events:none; overflow:visible; }
	  .tw-sel-frame { position:absolute; box-sizing:border-box; border:1.5px solid var(--tw-accent-frame-strong); box-shadow:0 0 0 2px rgba(224,65,32,.08); pointer-events:none; }

  /* ===== Transform box (selection box -> scale/move/rotate, does not pollute box-shadow: pure overlay) ===== */
  /* The transform box must paint above every child of the preview component; if the component itself has a high z-index (e.g. a card with z-index:100), this must be higher */
  #tw-tbox { position:absolute; z-index:99999; pointer-events:none; display:none; }
  #tw-tbox.on { display:block; }
	  .tw-tbox-frame { position:absolute; inset:0; border:1.5px solid var(--tw-accent); pointer-events:none; box-sizing:border-box; box-shadow:0 0 0 1px rgba(255,255,255,.9), inset 0 0 0 1px rgba(255,255,255,.9); }
  .tw-tbox-body { position:absolute; inset:0; pointer-events:auto; cursor:move; z-index:1; }
	  .tw-tbox-h { position:absolute; width:9px; height:9px; box-sizing:border-box; background:#fff; border:1.5px solid var(--tw-accent); border-radius:2px; pointer-events:auto; z-index:3; }
  .tw-tbox-h.e-nw{ left:-5px;  top:-5px;    cursor:nwse-resize; }
  .tw-tbox-h.e-n { left:50%;   top:-5px;    margin-left:-4.5px; cursor:ns-resize; }
  .tw-tbox-h.e-ne{ right:-5px; top:-5px;    cursor:nesw-resize; }
  .tw-tbox-h.e-e { right:-5px; top:50%;     margin-top:-4.5px;  cursor:ew-resize; }
  .tw-tbox-h.e-se{ right:-5px; bottom:-5px; cursor:nwse-resize; }
  .tw-tbox-h.e-s { left:50%;   bottom:-5px; margin-left:-4.5px; cursor:ns-resize; }
  .tw-tbox-h.e-sw{ left:-5px;  bottom:-5px; cursor:nesw-resize; }
  .tw-tbox-h.e-w { left:-5px;  top:50%;     margin-top:-4.5px;  cursor:ew-resize; }
	  .tw-tbox-rotline { position:absolute; left:50%; top:-16px; width:1.5px; height:16px; margin-left:-.75px; background:var(--tw-accent); pointer-events:none; z-index:2; }
	  .tw-tbox-rot { position:absolute; left:50%; top:-28px; width:13px; height:13px; margin-left:-6.5px; box-sizing:border-box; border-radius:50%; border:1.5px solid var(--tw-accent); background:#fff; pointer-events:auto; cursor:grab; z-index:3; }
	  .tw-tbox-size { position:absolute; left:50%; top:100%; transform:translate(-50%,9px); background:var(--tw-accent); color:#fff; font-size:11px; font-weight:600; line-height:1; padding:4px 9px; border-radius:6px; white-space:nowrap; pointer-events:none; box-shadow:0 1px 4px rgba(0,0,0,.18); }
  /* Multi-select: keep only the outer frame + move, hide scale/rotate handles */
  #tw-tbox.multi .tw-tbox-h, #tw-tbox.multi .tw-tbox-rot, #tw-tbox.multi .tw-tbox-rotline { display:none; }
  #tw-hover { position:absolute; z-index:99998; pointer-events:none; display:none; }
  #tw-hover.on { display:block; }
	  .tw-hover-frame { position:absolute; inset:0; border:1.5px solid rgba(224,65,32,.72); box-sizing:border-box; box-shadow:0 0 0 2px var(--tw-accent-frame-soft); }

  /* ===== Right control panel (Figma style: three panes - fixed head, scrolling body, fixed footer) ===== */
  /* Title row: pinned to the top, does not scroll */
  .tw-h { flex:none; font-size:12.5px; font-weight:600; color:#1e1e1e; margin:0; padding:13px 16px 12px; display:flex; align-items:center; gap:8px; letter-spacing:.2px; background:#fff; border-bottom:1px solid #ececec; }
  .tw-h small { font-weight:400; color:#b3b3b3; font-size:10.5px; }

  /* Categories: flat collapsible sections split by thin rules; chevron on the left. Only this region scrolls */
  #panel { flex:1 1 auto; min-height:0; overflow-y:auto; padding:0 16px; }
  .tw-cat { border:none; border-bottom:1px solid #efefef; border-radius:0; margin:0; overflow:visible; }
  .tw-cat:last-child { border-bottom:none; }
  .tw-cat > summary { list-style:none; cursor:pointer; padding:12px 2px; font-size:12px; font-weight:600; color:#1e1e1e; background:transparent; display:flex; align-items:center; gap:8px; user-select:none; }
	  .tw-cat > summary:hover { color:var(--tw-accent); }
  .tw-cat > summary::-webkit-details-marker { display:none; }
  .tw-cat > summary::before { content:'›'; color:#bbb; font-size:15px; line-height:1; display:inline-block; width:10px; text-align:center; transition:transform .15s; }
  .tw-cat[open] > summary::before { transform:rotate(90deg); }
  .tw-cat-body { padding:2px 2px 14px; }

  .tw-row { margin:11px 0; }
  .tw-row label { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:#666; margin-bottom:6px; gap:8px; }
  .tw-row label .val { color:#1e1e1e; font-variant-numeric:tabular-nums; font-size:11px; background:#f3f3f4; border:1px solid #e6e6e6; border-radius:5px; padding:1px 7px; min-width:44px; text-align:right; line-height:18px; }
	  .tw-row label .val.center { color:var(--tw-accent); background:var(--tw-accent-softer); border-color:rgba(224,65,32,.3); font-weight:600; }
	  .tw-row input[type=range] { width:100%; accent-color:var(--tw-accent); margin:0; height:4px; }

  function panePoint(e){

  function stagePaneOrigin(){

  function createManualGuide(axis, pos){

  function placeManualGuide(g, pos){

  function startRulerDrag(axis, guide, e){

    function move(ev){

    function up(){

  function positionRulers(){

  function rulerSnapCandidates(axis, activeGuide){
    var pane=document.getElementById('tw-left'), stage=document.getElementById('card-stage'), sr=stage&&stage.getBoundingClientRect(), out=[];
    if(!stage || !sr) return out;
    function addRect(r, label){
      if(!r || r.width<=0 || r.height<=0) return;
      if(axis==='v'){
        out.push({pos:(r.left-sr.left)/zoom, label:label+' left'});
        out.push({pos:(r.left+r.width/2-sr.left)/zoom, label:label+' center'});
        out.push({pos:(r.right-sr.left)/zoom, label:label+' right'});
      } else {
        out.push({pos:(r.top-sr.top)/zoom, label:label+' top'});
        out.push({pos:(r.top+r.height/2-sr.top)/zoom, label:label+' middle'});
        out.push({pos:(r.bottom-sr.top)/zoom, label:label+' bottom'});
      }
    }
    var o=stagePaneOrigin();
    if(axis==='v'){
      out.push({pos:0, label:'stage left'});
      out.push({pos:o.w/2, label:'stage center'});
      out.push({pos:o.w, label:'stage right'});
    } else {
      out.push({pos:0, label:'stage top'});
      out.push({pos:o.h/2, label:'stage middle'});
      out.push({pos:o.h, label:'stage bottom'});
    }

      if(typeof NON_PICKABLE!=='undefined' && NON_PICKABLE[k]) return;
      addRect(rectFor(k), LAYER_LABEL[k]||k);
    });
    rulerGuides.forEach(function(g){
      if(g===activeGuide || g.dataset.axis!==(axis==='v'?'v':'h')) return;
      out.push({pos:Number(g.dataset.pos)||0, label:'guide'});
    });

  }
  function snapRulerGuide(axis, pos, activeGuide){

    return best || {pos:pos, label:''};
  }

  // ---- Smart Guides: live alignment lines + magnetic snapping while moving ----
  var smartDrag=null;
  function setupSmartGuides(){

    var box=document.createElement('div');
    box.id='tw-smart';

  function groupRect(keys){
    var rects=[];
    keys.forEach(function(k){ var r=rectFor(k); if(r) rects.push(r); });
    if(!rects.length) return null;
    var L=Infinity,T=Infinity,R=-Infinity,B=-Infinity;
    rects.forEach(function(r){ L=Math.min(L,r.left); T=Math.min(T,r.top); R=Math.max(R,r.right); B=Math.max(B,r.bottom); });
    return {left:L, top:T, right:R, bottom:B, width:R-L, height:B-T, cx:(L+R)/2, cy:(T+B)/2};
  }
  function buildSmartDrag(keys){
    var moving={}; keys.forEach(function(k){ moving[k]=true; });
    var xs=[], ys=[];
    function addRect(r, label){
      if(!r) return;
      xs.push({pos:r.left, label:label+' left'}, {pos:r.left+r.width/2, label:label+' center'}, {pos:r.right, label:label+' right'});
      ys.push({pos:r.top, label:label+' top'}, {pos:r.top+r.height/2, label:label+' middle'}, {pos:r.bottom, label:label+' bottom'});
    }
    var stage=document.getElementById('card-stage');
    if(stage) addRect(stage.getBoundingClientRect(), 'stage');
    Object.keys(SEL).forEach(function(k){
      if(moving[k] || (typeof NON_PICKABLE!=='undefined' && NON_PICKABLE[k])) return;
      var r=rectFor(k);
      if(r && r.width>2 && r.height>2) addRect(r, LAYER_LABEL[k]||k);
    });
    var pane=document.getElementById('tw-left'), pr=pane.getBoundingClientRect();
    rulerGuides.forEach(function(g){
      var pos=Number(g.dataset.pos)||0;
      if(g.dataset.axis==='v') xs.push({pos:stageCoordToPane('v', pos)-pane.scrollLeft+pr.left, label:'manual guide'});
      else ys.push({pos:stageCoordToPane('h', pos)-pane.scrollTop+pr.top, label:'manual guide'});
    });

    syncOffsetSliders(cur); commit();
  }
  document.getElementById('multi-align').addEventListener('click',function(e){
    var b=e.target.closest('button');
    if(b){ e.preventDefault(); e.stopPropagation(); alignMulti(b.dataset.ma); }
  });

  // ---- Transform box (upgraded selection box: corners = proportional scale, edges = resize width/height, drag inside to move, rotate at top, live px label) ----
  function setupTBox(){
    setupSelectedBoxes();
    setupHoverBox();
    setupSmartGuides();
    var box=document.createElement('div'); box.id='tw-tbox';
    var html='<div class="tw-tbox-frame"></div><div class="tw-tbox-body"></div>'+
      '<div class="tw-tbox-rotline"></div><div class="tw-tbox-rot" title="Rotate"></div>';
    ['nw','n','ne','e','se','s','sw','w'].forEach(function(h){ html+='<div class="tw-tbox-h e-'+h+'" data-h="'+h+'"></div>'; });
    html+='<div class="tw-tbox-size"></div>';
    box.innerHTML=html;
    document.getElementById('tw-left').appendChild(box);
    box.addEventListener('mousedown', function(e){
      if(e.target.closest('.tw-tbox-h')) startResize(e, e.target.closest('.tw-tbox-h').dataset.h);
      else if(e.target.closest('.tw-tbox-rot')) startRotate(e);
      else if(e.target.closest('.tw-tbox-body')) startBodyDrag(e);
    });
    window.addEventListener('resize', syncOverlays);
    document.getElementById('tw-left').addEventListener('scroll', syncOverlays, {passive:true});
  }
  var tboxRAF=0;
  var overlayRAF=0;
  function scheduleTBox(){ if(tboxRAF) return; tboxRAF=requestAnimationFrame(function(){ tboxRAF=0; updateTBox(); updateHoverBox(); }); }
  function syncOverlays(){
    if(overlayRAF) return;
    overlayRAF=requestAnimationFrame(function(){
      overlayRAF=0;
      updateTBox();
      updateHoverBox();
      positionRulers();
    });
  }
  function setupSelectedBoxes(){
    if(document.getElementById('tw-selected')) return;
    var box=document.createElement('div');
    box.id='tw-selected';
    document.getElementById('tw-left').appendChild(box);
  }
  function updateSelectedBoxes(){
    var wrap=document.getElementById('tw-selected'); if(!wrap) return;
    wrap.innerHTML='';
    var le=document.getElementById('tw-left'), lr=le.getBoundingClientRect();
    multiKeys().forEach(function(k){
      var r=rectFor(k); if(!r) return;
      var f=document.createElement('div');
      f.className='tw-sel-frame';
      f.style.left=(r.left-lr.left+le.scrollLeft)+'px';
      f.style.top=(r.top-lr.top+le.scrollTop)+'px';
      f.style.width=r.width+'px';
      f.style.height=r.height+'px';
      wrap.appendChild(f);
    });
  }
  function updateTBox(){
    var box=document.getElementById('tw-tbox'); if(!box) return;
    updateSelectedBoxes();
    var keys=multiKeys();
    var rects=[]; keys.forEach(function(k){ var r=rectFor(k); if(r) rects.push(r); });
    if(!rects.length){ box.classList.remove('on'); return; }
    var L=Infinity,T=Infinity,R=-Infinity,B=-Infinity;
    rects.forEach(function(r){ L=Math.min(L,r.left); T=Math.min(T,r.top); R=Math.max(R,r.right); B=Math.max(B,r.bottom); });
    var le=document.getElementById('tw-left'), lr=le.getBoundingClientRect();
    box.style.left  = (L-lr.left+le.scrollLeft)+'px';
    box.style.top   = (T-lr.top +le.scrollTop )+'px';
    box.style.width = (R-L)+'px';
    box.style.height= (B-T)+'px';
    box.classList.toggle('multi', keys.length>=2);
    box.classList.add('on');
    var sz=box.querySelector('.tw-tbox-size');
    if(sz) sz.textContent=Math.round((R-L)/zoom)+' × '+Math.round((B-T)/zoom)+' px';
  }
  function endDrag(mv){
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.body.style.cursor=''; commit(); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  }
  // corner = proportional scale (_scl, around center); edge = change width / height
  function startResize(e, hk){
    e.preventDefault();
    var k=cur; ensure(k); var r=rectFor(k); if(!r) return;
    var cx=r.left+r.width/2, cy=r.top+r.height/2;
    var corner=(hk.length===2), horiz=(hk==='e'||hk==='w');
    var d0=Math.hypot(e.clientX-cx,e.clientY-cy)||1, s0=(state[k]._scl==null?1:state[k]._scl);
    var startW=r.width/zoom, startH=r.height/zoom, sx=e.clientX, sy=e.clientY;
    function mv(ev){
      if(corner){
        var ns=Math.max(0.05, Math.round(s0*Math.hypot(ev.clientX-cx,ev.clientY-cy)/d0*100)/100);
        state[k]._scl=ns; applyEl(k);
        var i=document.getElementById('i-_scl'); if(i) i.value=fmtNum(ns);
        var ip=document.getElementById('i-_sclPct'); if(ip) ip.value=fmtNum(ns*100);
      } else if(horiz){
        var nw=Math.max(8,Math.min(2000, Math.round(startW + (ev.clientX-sx)/zoom*(hk==='e'?1:-1))));
        clearSizeModeProps(state[k], 'width'); state[k]._widthMode='fixed';
        state[k].width=nw+'px'; applyEl(k);
        var iw=document.getElementById('i-width'); if(iw) iw.value=fmtNum(nw);
      } else {
        var nh=Math.max(8,Math.min(2000, Math.round(startH + (ev.clientY-sy)/zoom*(hk==='s'?1:-1))));
        clearSizeModeProps(state[k], 'height'); state[k]._heightMode='fixed';
        state[k].height=nh+'px'; applyEl(k);
        var ih=document.getElementById('i-height'); if(ih) ih.value=fmtNum(nh);
      }
      updateTBox();
    }
    document.body.style.cursor=(getComputedStyle(e.target).cursor||'');
    endDrag(mv);
  }
  function startRotate(e){
    e.preventDefault();
    var k=cur; ensure(k); var r=rectFor(k); if(!r) return;
    var cx=r.left+r.width/2, cy=r.top+r.height/2;
    var a0=Math.atan2(e.clientY-cy,e.clientX-cx), r0=state[k]._rot||0;
    function mv(ev){
      var deg=Math.max(-180,Math.min(180, Math.round(r0+(Math.atan2(ev.clientY-cy,ev.clientX-cx)-a0)*180/Math.PI)));
      state[k]._rot=deg; applyEl(k);
      var i=document.getElementById('i-_rot'); if(i) i.value=fmtNum(deg);
      updateTBox();
    }
    document.body.style.cursor='grabbing';
    endDrag(mv);
  }
  // drag inside the box = change _tx/_ty (multi-select moves the whole group); no drag = treat as clicking the element underneath
  function startBodyDrag(e){
    e.preventDefault();
    var sx=e.clientX, sy=e.clientY, moved=false, keys=multiKeys(), starts={};
    keys.forEach(function(k){ ensure(k); starts[k]={tx:state[k]._tx||0, ty:state[k]._ty||0}; });
    smartDrag=buildSmartDrag(keys);
    function mv(ev){
      if(!moved && Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)<3) return;
      moved=true;
      var snap=smartSnap(keys, ev.clientX-sx, ev.clientY-sy);
      var dx=snap.dx/zoom, dy=snap.dy/zoom;
      keys.forEach(function(k){
        ensure(k);
        var nx=Math.round(starts[k].tx+dx), ny=Math.round(starts[k].ty+dy);
        state[k]._tx=nx; state[k]._ty=ny; applyEl(k);
      });
      syncOffsetSliders(cur); updateTBox();
    }
    function up(ev){
      document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up);
      document.body.style.cursor='';
      hideSmartGuides();
      if(moved) commit(); else selectUnder(ev);
    }
    document.body.style.cursor='move';
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  }
  function selectUnder(ev){
    pickAt(ev.clientX, ev.clientY, ev.shiftKey);
  }
  setupTBox();

  // ---- Shell ergonomics: resizable Layers pane + Photoshop-style spacebar pan ----
  function setupLayerResize(){
    var wrap=document.querySelector('.tw-wrap');
    var grip=document.getElementById('tw-left-resizer');
    if(!wrap || !grip) return;
    var saved=parseInt(localStorage.getItem('uiTweakerLeftPaneW')||'',10);
    if(saved) wrap.style.setProperty('--tw-left-w', Math.max(180, Math.min(560, saved))+'px');
    grip.addEventListener('mousedown',function(e){
      e.preventDefault();
      grip.classList.add('dragging');
      var wr=wrap.getBoundingClientRect();
      function mv(ev){
        var w=Math.max(180, Math.min(560, Math.round(ev.clientX-wr.left)));
        wrap.style.setProperty('--tw-left-w', w+'px');
        localStorage.setItem('uiTweakerLeftPaneW', String(w));
      }
      function up(){
        document.removeEventListener('mousemove',mv);
        document.removeEventListener('mouseup',up);
        grip.classList.remove('dragging');
      }
      document.addEventListener('mousemove',mv);
      document.addEventListener('mouseup',up);
    });
  }
  function setupSpacePan(){
    var pane=document.getElementById('tw-left');
    if(!pane) return;
    var space=false, panning=false, sx=0, sy=0, sl=0, st=0;
    function editingTarget(t){ return t && t.closest && t.closest('input, textarea, select, [contenteditable="true"]'); }
    document.addEventListener('keydown',function(e){
      if(e.code!=='Space' || editingTarget(e.target)) return;
      e.preventDefault();
      if(space) return;
      space=true;
      pane.classList.add('space-pan');
    });
    document.addEventListener('keyup',function(e){
      if(e.code!=='Space') return;
      space=false;
      if(!panning) pane.classList.remove('space-pan');
    });
    pane.addEventListener('mousedown',function(e){
      if(!space || e.button!==0 || e.target.closest('.tw-toolbar')) return;
      e.preventDefault();
      panning=true;
      sx=e.clientX; sy=e.clientY; sl=pane.scrollLeft; st=pane.scrollTop;
      pane.classList.add('is-panning');
      function mv(ev){
        pane.scrollLeft=sl-(ev.clientX-sx);
        pane.scrollTop=st-(ev.clientY-sy);
        syncOverlays();
      }
      function up(){
        document.removeEventListener('mousemove',mv);
        document.removeEventListener('mouseup',up);
        panning=false;
        pane.classList.remove('is-panning');
        if(!space) pane.classList.remove('space-pan');
        syncOverlays();
      }
      document.addEventListener('mousemove',mv);
      document.addEventListener('mouseup',up);
    },true);
  }
  setupLayerResize();
  setupSpacePan();
  function setupArrowNudge(){
    function editingTarget(t){ return t && t.closest && t.closest('input, textarea, select, [contenteditable="true"]'); }
    document.addEventListener('keydown',function(e){
      if(editingTarget(e.target) || e.metaKey || e.ctrlKey || e.altKey) return;
      var dx=0, dy=0;
      if(e.key==='ArrowLeft') dx=-1;
      else if(e.key==='ArrowRight') dx=1;
      else if(e.key==='ArrowUp') dy=-1;
      else if(e.key==='ArrowDown') dy=1;
      else return;
      var keys=multiKeys();
      if(!keys.length) return;
      e.preventDefault();
      var step=e.shiftKey?10:1;
      keys.forEach(function(k){
        ensure(k);
        state[k]._tx=(state[k]._tx||0)+dx*step;
        state[k]._ty=(state[k]._ty||0)+dy*step;
        applyEl(k);
      });
      syncOffsetSliders(cur);
      commit();
      updateTBox();
    });
  }
  setupArrowNudge();

  // ---- Device width ----
  document.getElementById('dev-seg').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#dev-seg button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
    document.getElementById('card-stage').style.width=b.dataset.w+'px';
    scheduleTBox();
    positionRulers();
  });

  // ---- Zoom view (scales the preview only, not the whole page; uses CSS zoom so the scroll area grows too) ----
  var zoom=1;
  function setZoom(z){
    zoom=Math.max(0.5, Math.min(4, Math.round(z*100)/100));
    document.getElementById('card-stage').style.zoom=zoom;
    document.getElementById('zoom-val').textContent=Math.round(zoom*100)+'%';
    scheduleTBox();
    positionRulers();
  }
  document.getElementById('zoom-in').addEventListener('click',function(){ setZoom(zoom+0.25); });
  document.getElementById('zoom-out').addEventListener('click',function(){ setZoom(zoom-0.25); });
  document.getElementById('zoom-val').addEventListener('click',function(){ setZoom(1); });
  // Ctrl/Cmd/Option + wheel zooms the preview; plain wheel pans the zoomed preview pane.
  document.getElementById('tw-left').addEventListener('wheel',function(e){
    if(e.ctrlKey||e.metaKey||e.altKey){
      e.preventDefault();
      setZoom(zoom + (e.deltaY<0?0.1:-0.1));
      return;
    }
    if(zoom>1){
      e.preventDefault();
      var pane=document.getElementById('tw-left');
      pane.scrollTop += e.deltaY;
      pane.scrollLeft += e.deltaX;
      updateTBox(); updateHoverBox(); positionRulers();
    }
  },{passive:false});

  // ---- history ----
  function snapshot(){ return JSON.parse(JSON.stringify(state)); }
  function captureBaseStyles(){
    Object.keys(SEL).forEach(function(k){
      var el=editElFor(k);
      if(el) baseStyle[k]=el.getAttribute('style') || '';
      if(el && (el.tagName||'').toLowerCase()==='svg'){
        svgRootPaint[k]={ fill:el.getAttribute('fill'), stroke:el.getAttribute('stroke') };
        svgChildStyle[k]=[];
        svgChildPaint[k]=[];
        svgPaintNodes(el).forEach(function(n,i){
          svgChildStyle[k][i]=n.getAttribute('style') || '';
          svgChildPaint[k][i]={ fill:n.getAttribute('fill'), stroke:n.getAttribute('stroke') };
        });
      }
    });
  }
  function svgPaintNodes(el){
    return Array.prototype.slice.call(el.querySelectorAll('g, path, circle, rect, line, polyline, polygon, ellipse, use'));
  }
  function svgSnapshotPaintValue(key, prop){
    var el=editElFor(key);
    if(!el || (el.tagName||'').toLowerCase()!=='svg') return cssVal(key, prop);
    var nodes=Array.prototype.slice.call(el.querySelectorAll('path, circle, rect, line, polyline, polygon, ellipse, use'));
    if(!nodes.length) nodes=svgPaintNodes(el);
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i];
      if(prop==='fill' && n.classList && n.classList.contains('cutout')) continue;
      var v=(getComputedStyle(n).getPropertyValue(prop) || n.getAttribute(prop) || '').trim();
      if(!v || v==='none' || v==='transparent') continue;
      if(v==='currentColor') v=getComputedStyle(n).getPropertyValue('color');
      var parsed=rgbToHex(v);
      if(parsed.none) continue;
      return v;
    }
    var root=(getComputedStyle(el).getPropertyValue(prop) || el.getAttribute(prop) || '').trim();
    if(root==='currentColor') root=getComputedStyle(el).getPropertyValue('color');
    return root;
  }
  function restoreBaseStyle(k){
    var el=editElFor(k); if(!el) return;
    var v=baseStyle[k] || '';
    if(v) el.setAttribute('style', v);
    else el.removeAttribute('style');
    if((el.tagName||'').toLowerCase()==='svg'){
      ['fill','stroke'].forEach(function(prop){
        var root=(svgRootPaint[k]||{})[prop];
        if(root==null) el.removeAttribute(prop);
        else el.setAttribute(prop, root);
      });
      var arr=svgChildStyle[k] || [];
      var parr=svgChildPaint[k] || [];
      svgPaintNodes(el).forEach(function(n,i){
        var sv=arr[i] || '';
        if(sv) n.setAttribute('style', sv);
        else n.removeAttribute('style');
        ['fill','stroke'].forEach(function(prop){
          var pv=(parr[i]||{})[prop];
          if(pv==null) n.removeAttribute(prop);
          else n.setAttribute(prop, pv);
        });
      });
    }
  }
  function commit(){
    history=history.slice(0,hidx+1);
    history.push(snapshot()); hidx=history.length-1;
    updateHistBtns(); updateSummary();
  }
  function restore(snap){
    Object.keys(SEL).forEach(function(k){ restoreBaseStyle(k); });
    Object.keys(ORIG_TEXT).forEach(restoreOriginalText);
    state=JSON.parse(JSON.stringify(snap));
    Object.keys(state).forEach(function(k){ applyEl(k); });
    buildPanel();
    refreshSelectionUI();
  }
  function doUndo(){ if(hidx>0){ hidx--; restore(history[hidx]); updateHistBtns(); updateSummary(); } }
  function doRedo(){ if(hidx<history.length-1){ hidx++; restore(history[hidx]); updateHistBtns(); updateSummary(); } }
  document.getElementById('btn-undo').addEventListener('click',doUndo);
  document.getElementById('btn-redo').addEventListener('click',doRedo);
  // Keyboard: Ctrl/Cmd+Z undo, Ctrl/Cmd+Shift+Z or Ctrl+Y redo
  document.addEventListener('keydown',function(e){
    var mod=e.metaKey||e.ctrlKey; if(!mod) return;
    var k=(e.key||'').toLowerCase();
    if(k==='z'){ e.preventDefault(); if(e.shiftKey) doRedo(); else doUndo(); }
    else if(k==='y'){ e.preventDefault(); doRedo(); }
  });
  document.getElementById('btn-reset').addEventListener('click',function(){
    var has=Object.keys(state).some(function(k){ return state[k] && Object.keys(state[k]).length; });
    if(!has){ toast('No changes to reset'); return; }
    restore({});                 // restore all elements to before tweaking (clear overrides)
    commit();                    // record as one step, still undoable
    toast('Restored to values before tweaking');
  });
  function updateHistBtns(){ document.getElementById('btn-undo').disabled=hidx<=0; document.getElementById('btn-redo').disabled=hidx>=history.length-1; }

  // ---- Summary + confirm ----
  function changedProps(key){
    var s=state[key]||{}, out={};
    Object.keys(s).forEach(function(p){
      if(p==='_tx')out['translateX']=s._tx+'px';
      else if(p==='_ty')out['translateY']=s._ty+'px';
      else if(p==='_rot')out['rotate']=s._rot+'deg';
      else if(p==='_scl')out['scale']=s._scl;
      else if(p==='_flipX')out['flipX']=s._flipX?'on':'off';
      else if(p==='_flipY')out['flipY']=s._flipY?'on':'off';
      else if(p==='_svgSize')out['width/height']=s._svgSize+'px';
      else if(p==='_svgBgShape')out['background-shape']=s._svgBgShape;
      else if(p==='_effects'){}
      else if(p==='_gradStartHex'||p==='_gradEndHex'||p==='_gradStartA'||p==='_gradEndA'||p==='_gradStartPos'||p==='_gradEndPos'||p==='_gradAngle'||p==='_gradMidHex'||p==='_gradMidA'||p==='_gradMidPos'){}
      else if(p==='_text')out['text-content']=s._text;
      else if(p==='_ph')out['placeholder']=s._ph;
      else if(p==='_val')out['value (typed text)']=s._val;
      else if(p==='_shadows'){}
      else if(p==='_bgHex')out['background']=hexToRgba(s._bgHex,s._bgA);
      else if(p==='_txHex')out['color']=s._txHex;
      else if(p==='_bdHex')out['border-color']=hexToRgba(s._bdHex,s._bdA);
      else if(p==='_fillHex')out['fill']=s._fillHex;
      else if(p==='_strokeHex')out['stroke']=s._strokeHex;
      else if(p.charAt(0)!=='_') out[p]=s[p];
    });
    if('_shadows' in s) out['box-shadow']=composeShadow(s._shadows);
    if('_effects' in s) out['effects']=JSON.stringify(s._effects);
    if('_gradStartHex' in s) out['background-gradient']=makeGradient(s);
    return out;
  }
  function buildText(){
    /* ⟦PROJECT-SPECIFIC #8: confirm-output "Component / Source" strings⟧ */
    var lines=['[UI Tweaker Confirm]','Component: Demo Card','Source: examples/demo.css',''];
    var any=false, hasText=false;
    Object.keys(SEL).forEach(function(key){
      var ch=changedProps(key); var keys=Object.keys(ch); if(!keys.length) return;
      any=true;
      if(keys.some(function(p){ return p==='text-content'||p==='placeholder'||p==='value (typed text)'; })) hasText=true;
      lines.push('['+(OUT_SEL[key]||key)+']');
      keys.forEach(function(p){ lines.push('  - '+p+': '+ch[p]); });
      lines.push('');
    });
    if(hasText) lines.push('NOTE: text-content / placeholder / value are display copy, not styling. Update the real HTML/JS/template string source.');
    lines.push('Please apply these values to the corresponding code and verify.');
    return any? lines.join('\n') : '';
  }
  function updateSummary(){
    var t=buildText();
    document.getElementById('summary').textContent= t? t : 'No changes yet';
  }
  document.getElementById('btn-confirm').addEventListener('click',function(){
    var t=buildText();
    if(!t){ toast('Nothing has been changed yet'); return; }
    try{ navigator.clipboard && navigator.clipboard.writeText(t); }catch(e){}
    if(window.sendPrompt){ try{ window.sendPrompt(t); }catch(e){} }
    toast('Confirm text copied — paste it back into the chat to apply');
  });
  function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},2200); }

  // ---- Boot: wait for the stylesheet to load before reading computed style ----
  function init(){
    document.getElementById('card-stage').style.width='390px';
    captureBaseStyles();
    captureOrigText();
    buildLayerTree();
    pick('card');
    history=[snapshot()]; hidx=0; updateHistBtns(); updateSummary();
  }
  if(document.readyState==='complete') setTimeout(init,80);
  else window.addEventListener('load',function(){ setTimeout(init,80); });
})();
</script>
